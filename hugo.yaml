baseURL: "https://hzznetsec.github.io/"
languageCode: zh-cn
title: HzzNetSec
theme: PaperMod
pagination:
  pagerSize: 5

params:
  env: production
  author: HzzNetSec
  description: "网络安全技术分享与学习记录"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  homeInfoParams:
    Title: "Hi, 我是 HzzNetSec 👋"
    Content: "网络安全技术分享与学习记录"
  socialIcons:
    - name: github
      url: "https://github.com/HzzNetSec"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: 文章
      url: /posts/
      weight: 1
    - name: 标签
      url: /tags/
      weight: 2
    - name: 关于
      url: /about/
      weight: 3
