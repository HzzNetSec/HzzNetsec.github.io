<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        h1, h2, h3 { color: #2c3e50; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
        nav { margin-bottom: 30px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .content { margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">首页</a> |
        <a href="/posts/">文章</a>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #999;">
        <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
    </footer>
</body>
</html>
